observable_behaviors:
- open returns a non-negative descriptor for existing or newly created files
- read copies file bytes into the user buffer and advances the file offset
- write copies user bytes into a file and advances the file offset
- close invalidates the descriptor for later operations
- fork inherits open file descriptors
- exec preserves the process identity and file descriptor table while replacing program image
- fstat/link/unlink are exercise extension semantics, not confirmed in the current base implementation
