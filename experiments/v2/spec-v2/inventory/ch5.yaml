- dead_child_exit_record
- user_address_space
- process_context
- program_break
- ready_queue
observable_behaviors:
- syscall return value
- child and parent observing different fork return values
- child exit status visible through wait/waitpid
- wait reports no child after all children are reaped
- exec replaces current program image on success
- sched_yield permits another runnable process to run
- sbrk returns the old break and changes heap accessibility
- unsupported or unimplemented syscall exits or returns failure depending on dispatch path
